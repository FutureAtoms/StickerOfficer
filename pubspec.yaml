name: sticker_officer
description: AI-powered sticker maker — create, share, and discover stickers for WhatsApp & Telegram.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^17.0.0

  # Firebase (uncomment when GoogleService-Info.plist / google-services.json configured)
  # firebase_core: ^4.5.0
  # firebase_auth: ^6.2.0
  # cloud_firestore: ^6.1.3
  # firebase_storage: ^13.1.0
  # firebase_messaging: ^16.1.2
  # firebase_analytics: ^12.1.3
  # firebase_crashlytics: ^5.0.8
  # firebase_remote_config: ^6.2.0

  # Image processing
  image: ^4.2.0

  # AI (cloud)
  dio: ^5.5.0

  # Image/Video
  image_picker: ^1.1.2
  image_cropper: ^11.0.0
  video_player: ^2.9.1
  ffmpeg_kit_flutter_new: ^4.1.0
  cached_network_image: ^3.3.1

  # Drawing
  perfect_freehand: ^2.0.0

  # Auth
  # google_sign_in: ^7.2.0
  # sign_in_with_apple: ^7.0.1
  flutter_secure_storage: ^9.0.0

  # Monetization
  # google_mobile_ads: ^6.0.0

  # Export
  share_plus: ^12.0.1
  path_provider: ^2.1.3

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  auto_size_text: ^3.0.0

  # Utils
  uuid: ^4.4.2
  intl: ^0.20.2
  url_launcher: ^6.3.0
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpeg"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#FFF8F0"
  image: assets/images/app_icon.jpeg
  android: true
  ios: true
  android_12:
    image: assets/images/app_icon.jpeg
    color: "#FFF8F0"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/fonts/
    - assets/seed_stickers/
    - assets/test_assets/
  # Fonts loaded via google_fonts package at runtime
