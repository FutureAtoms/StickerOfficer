name: sticker_officer
description: AI-powered sticker maker — create, share, and discover stickers for WhatsApp & Telegram.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.2.0
  firebase_crashlytics: ^4.0.0
  firebase_remote_config: ^5.0.0

  # Image processing
  image: ^4.2.0

  # AI (cloud)
  dio: ^5.5.0

  # Image/Video
  image_picker: ^1.1.2
  image_cropper: ^7.1.0
  video_player: ^2.9.1
  cached_network_image: ^3.3.1

  # Drawing
  perfect_freehand: ^2.0.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Monetization
  google_mobile_ads: ^5.1.0

  # Export
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  auto_size_text: ^3.0.0

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  mockito: ^5.4.4
  fake_cloud_firestore: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/fonts/
  # Fonts loaded via google_fonts package at runtime
