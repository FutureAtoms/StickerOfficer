name = "sticker-officer-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "sticker-officer"
database_id = "86668ece-1e71-4578-98b8-0b79b3eb4542"

[[r2_buckets]]
binding = "R2"
bucket_name = "sticker-officer-packs"

[[kv_namespaces]]
binding = "KV"
id = "174803fc29b0450bbdf2d784d592fa81"

# IMPORTANT: In production, override these via `wrangler secret put`:
#   wrangler secret put JWT_SECRET
#   wrangler secret put GOOGLE_CLIENT_IDS
#   wrangler secret put APPLE_BUNDLE_ID
# Cloudflare secrets always take precedence over [vars].
[vars]
JWT_SECRET = "test-secret-do-not-use-in-production"
GOOGLE_CLIENT_IDS = ""
APPLE_BUNDLE_ID = ""
